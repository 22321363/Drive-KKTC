<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" width="100%" height="100%">
  <!-- Background -->
  <rect width="360" height="640" fill="#FFFFFF"/>

  <!-- Main Diagonal Skewer Stick -->
  <line x1="90" y1="450" x2="270" y2="270" stroke="#D1C7BD" stroke-width="3" stroke-linecap="round"/>

  <!-- Lower Skewered Element -->
  <g transform="translate(150, 390) rotate(-45)">
    <!-- Backing leaf/oval -->
    <ellipse cx="0" cy="14" rx="22" ry="9" fill="#CBD5CD"/>
    <!-- Dumpling -->
    <circle cx="0" cy="0" r="18" fill="#F3E5D8"/>
  </g>

  <!-- Upper Skewered Element -->
  <g transform="translate(210, 330) rotate(-45)">
    <!-- Backing leaf/oval -->
    <ellipse cx="0" cy="14" rx="22" ry="9" fill="#CBD5CD"/>
    <!-- Dumpling -->
    <circle cx="0" cy="0" r="18" fill="#F3E5D8"/>
  </g>
</svg>